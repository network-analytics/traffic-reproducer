name: Basic Checks

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'  # every day at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Set up loopback interfaces
        run: |
          sudo ifconfig lo:1 192.168.100.1 up
          sudo ifconfig lo:2 192.168.100.2 up

      - name: Run example
        run: |
          python main.py -v -t examples/ipfix-traffic.yml

      - name: Check packet count using tcpdump
        run: |
          sudo tcpdump -i lo -c 6
